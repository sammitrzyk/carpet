<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>

    <div style="font-family:var(--cg-headline);font-weight:800;font-size:14px;color:var(--cg-fg-1);margin-bottom:6px;">Sofa</div>
    <div style="font-family:var(--cg-display);font-size:32px;line-height:1;color:var(--cg-fg-1);">$100</div>
    <div style="font-family:var(--cg-body);font-size:12px;color:var(--cg-fg-3);margin-top:4px;">flat</div>
  </div>
</div>
</body></html>
