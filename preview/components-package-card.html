<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Package card</div>
<div style="background:#fff;border:1px solid var(--cg-line);border-radius:14px;padding:24px;box-shadow:var(--cg-shadow-2);position:relative;">
  <div style="position:absolute;top:-12px;left:24px;font-family:var(--cg-headline);font-weight:800;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;background:var(--cg-green);color:#0E1110;padding:6px 12px;border-radius:999px;">Most Popular</div>
  <div style="font-family:var(--cg-headline);font-weight:800;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;color:var(--cg-fg-3);margin-bottom:8px;">Standard</div>
  <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px;">
    <div style="font-family:var(--cg-display);font-size:64px;line-height:1;color:var(--cg-fg-1);">$60</div>
    <div style="font-family:var(--cg-body);font-size:17px;color:var(--cg-fg-3);">/ area</div>
  </div>
  <div style="font-family:var(--cg-body);font-size:14px;color:var(--cg-fg-3);margin-bottom:18px;">Starting at $180 for up to 3 areas</div>
  <button style="width:100%;font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:var(--cg-green);color:#0E1110;border:none;border-radius:10px;padding:14px;cursor:pointer;">Book Standard</button>
</div>
</body></html>
