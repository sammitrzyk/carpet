<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Buttons · primary, secondary, ghost-on-dark</div>
<div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px;">
  <button style="font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:var(--cg-green);color:#0E1110;border:none;border-radius:10px;padding:14px 22px;cursor:pointer;">Book Online</button>
  <button style="font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:transparent;color:var(--cg-fg-1);border:1.5px solid var(--cg-fg-1);border-radius:10px;padding:14px 22px;cursor:pointer;">Call Now</button>
  <button style="font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:var(--cg-ink);color:var(--cg-cream);border:none;border-radius:10px;padding:14px 22px;cursor:pointer;">Request Quote</button>
</div>
<div style="background:var(--cg-ink);padding:18px;border-radius:12px;display:flex;gap:14px;flex-wrap:wrap;">
  <button style="font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:var(--cg-green);color:#0E1110;border:none;border-radius:10px;padding:14px 22px;cursor:pointer;">Request Commercial Quote</button>
  <button style="font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:14px;background:transparent;color:var(--cg-cream);border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;padding:14px 22px;cursor:pointer;">Call Now</button>
</div>
</body></html>
