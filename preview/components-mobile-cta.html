<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Sticky mobile CTA bar</div>
<div style="background:var(--cg-ink);padding:14px 16px;border-radius:12px;display:flex;gap:10px;">
  <button style="flex:1;font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:13px;background:transparent;color:var(--cg-cream);border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;padding:14px;cursor:pointer;">Call Now</button>
  <button style="flex:1.4;font-family:var(--cg-headline);font-weight:800;letter-spacing:0.04em;text-transform:uppercase;font-size:13px;background:var(--cg-green);color:#0E1110;border:none;border-radius:10px;padding:14px;cursor:pointer;">Book Online</button>
</div>
<div style="font-family:var(--cg-mono);font-size:11px;color:var(--cg-fg-3);margin-top:10px;">Fixed bottom · 60px · slides up at 240px scroll</div>
</body></html>
